name: Sync to Hugging Face

on:
  push:
    branches: [master, main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "prism@sync.bot"
          git config --global user.name "PRISM Sync Bot"
          git remote add hf https://ProfDrTktan:${HF_TOKEN}@huggingface.co/spaces/ProfDrTktan/PRISM
          git push hf master:main --force
